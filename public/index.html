<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuity</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <style>
      body { background: #fbfcfe; }

      /* Subtle rounded inputs/buttons */
      .form-control, .form-select {
        border-radius: 0.75rem;
        border-color: #d0d7de;
        background: #ffffff;
      }
      .form-control:focus, .form-select:focus {
        border-color: #80b3ff;
        box-shadow: 0 0 0 .25rem rgba(128, 179, 255, 0.2);
      }

      .btn { border-radius: 0.75rem; }
      .btn.btn-light { border-color: #d0d7de; }

      .card { border-color: #e6e8eb; }
      pre { white-space: pre-wrap; word-break: break-word; margin-bottom: 0; }

      /* Subtle dropdown (select) styling */
      .form-select {
        background-color: #fbfcfe;
      }
      .form-select:focus {
        border-color: #b6c7dd;
        box-shadow: 0 0 0 .2rem rgba(182, 199, 221, 0.25);
      }

      /* Match the arrow to a softer tone */
      .form-select {
        --bs-form-select-bg-img: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%236e7781' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
      }

      /* Floating label tweaks for subtle look */
      .form-floating > .form-select {
        padding-top: 1.25rem;
        padding-bottom: 0.5rem;
      }
      .form-floating > label {
        color: #6e7781;
        font-size: 0.9rem;
      }

      /* Notes collapse/expand */
      .notes-collapsed {
        display: -webkit-box;
        -webkit-line-clamp: 4;
        line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .notes-expanded {
        display: block;
        overflow: visible;
      }
      .toggle-notes {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.8rem;
        color: #0d6efd;
        cursor: pointer;
      }
      .toggle-notes:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <!-- Shared nav -->
    <nav class="navbar navbar-expand-sm navbar-light bg-white border-bottom mb-3 px-3">
      <span class="navbar-brand fw-semibold">Recuity</span>
      <div class="navbar-nav">
        <a class="nav-link active fw-semibold" href="/index.html">Hiring</a>
        <a class="nav-link" href="/leave.html">Leave</a>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row g-3 align-items-start">
        <div class="col-lg-8">
          <section class="card shadow-sm mb-3">
            <div class="card-body">
              <h2 class="h5 mb-3">Hiring</h2>

              <div class="row g-2">
                <div class="col-md-4">
                  <input id="name" class="form-control" autocomplete="name" placeholder="Name" aria-label="Name" />
                </div>
                <div class="col-md-4">
                  <input id="email" class="form-control" type="email" autocomplete="email" placeholder="Email " aria-label="Email " />
                </div>
                <div class="col-md-4">
                  <select id="status" class="form-select" aria-label="Status">
                    <option value="" selected hidden>Status</option>
                    <option>New</option>
                    <option>Shortlisted for L1</option>
                    <option>Shortlisted for L2</option>
                    <option>Shortlisted for L3</option>
                    <option>Offer made</option>
                    <option>Offer accepted</option>
                    <option>Offer rejected</option>
                    <option>Rejected in L1</option>
                    <option>Rejected in L2</option>
                    <option>Rejected in L3</option>
                    <option>Kept on hold</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <select id="reqSelect" class="form-select" aria-label="Requisition">
                    <option value="" selected>Requisition </option>
                  </select>
                </div>
                <div class="col-md-4">
                  <select id="panelMemberSelect" class="form-select" aria-label="Panel member">
                    <option value="" selected>Panel member</option>
                  </select>
                </div>
              </div>

              <div class="mt-3">
                <textarea id="comments" class="form-control" rows="6" placeholder="Hiring Notes" aria-label="Hiring Notes"></textarea>
              </div>

              <div class="d-flex gap-2 align-items-center mt-3">
                <button id="saveBtn" class="btn btn-primary btn-sm">Save</button>
                <button id="clearBtn" type="button" class="btn btn-light btn-sm">Clear</button>
                <div id="saveStatus" class="text-muted small"></div>
              </div>
              <div id="saveError" class="text-danger small mt-1"></div>
            </div>
          </section>

          <section class="card shadow-sm">
            <div class="card-body">
              <h2 class="h5 mb-3">Search</h2>

              <div class="row g-2 align-items-end">
                <div class="col-md-4">
                  <input id="search" class="form-control" placeholder="Name or email" aria-label="Name or email" />
                </div>
                <div class="col-md-4">
                  <select id="searchStatus" class="form-select" aria-label="Status">
                    <option value="" selected>Any status</option>
                    <option>New</option>
                    <option>Shortlisted for L1</option>
                    <option>Shortlisted for L2</option>
                    <option>Shortlisted for L3</option>
                    <option>Offer made</option>
                    <option>Offer accepted</option>
                    <option>Offer rejected</option>
                    <option>Rejected in L1</option>
                    <option>Rejected in L2</option>
                    <option>Rejected in L3</option>
                    <option>Kept on hold</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <select id="searchReqId" class="form-select" aria-label="Requisition">
                    <option value="" selected>Any requisition</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <select id="searchReqType" class="form-select" aria-label="Type">
                    <option value="" selected>Any type</option>
                    <option value="FTE">FTE</option>
                    <option value="FTC">FTC</option>
                  </select>
                </div>
              </div>
              <div class="mt-2">
                <button id="searchClearBtn" type="button" class="btn btn-light btn-sm">Clear</button>
              </div>

              <div id="results" class="mt-3"></div>
            </div>
          </section>
        </div>

        <div class="col-lg-4">
          <section class="card shadow-sm">
            <div class="card-header p-0 border-bottom-0">
              <ul class="nav nav-tabs card-header-tabs px-3 pt-2" id="rightPanelTabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="tab-req" data-bs-toggle="tab" data-bs-target="#pane-req" type="button" role="tab">Requisitions</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-panel" data-bs-toggle="tab" data-bs-target="#pane-panel" type="button" role="tab">Panel Members</button>
                </li>
              </ul>
            </div>
            <div class="card-body tab-content">

              <!-- Requisitions tab -->
              <div class="tab-pane fade show active" id="pane-req" role="tabpanel">
                <div class="mb-2">
                  <input id="reqId" class="form-control" placeholder="Requisition id" aria-label="Requisition id" />
                </div>
                <div class="mb-2">
                  <input id="reqName" class="form-control" placeholder="Requisition name" aria-label="Requisition name" />
                </div>
                <div class="mb-2">
                  <select id="reqType" class="form-select" aria-label="Type">
                    <option value="FTE" selected>FTE</option>
                    <option value="FTC">FTC</option>
                  </select>
                </div>
                <div class="mb-2">
                  <input id="reqStatus" class="form-control" placeholder="Status" aria-label="Status" />
                </div>
                <div class="mb-2">
                  <input id="reqLink" class="form-control" placeholder="Link" aria-label="Link" />
                </div>
                <div class="d-flex gap-2 mt-2">
                  <button id="reqSaveBtn" class="btn btn-primary btn-sm">Save</button>
                  <button id="reqClearBtn" type="button" class="btn btn-light btn-sm">Clear</button>
                </div>
                <div id="reqStatusMsg" class="text-muted small mt-2"></div>
                <div id="reqError" class="text-danger small"></div>
                <h3 class="h6 mt-4">All requisitions</h3>
                <div id="reqList" class="mt-2"></div>
              </div>

              <!-- Panel Members tab -->
              <div class="tab-pane fade" id="pane-panel" role="tabpanel">
                <div class="mb-2">
                  <input id="panelName" class="form-control" placeholder="Name" aria-label="Name" />
                </div>
                <div class="mb-2">
                  <input id="panelEmail" class="form-control" type="email" placeholder="Email (optional)" aria-label="Email" />
                </div>
                <div class="mb-2">
                  <input id="panelDepartment" class="form-control" placeholder="Department (optional)" aria-label="Department" />
                </div>
                <div class="d-flex gap-2 mt-2">
                  <button id="panelSaveBtn" class="btn btn-primary btn-sm">Save</button>
                  <button id="panelClearBtn" type="button" class="btn btn-light btn-sm">Clear</button>
                </div>
                <div id="panelStatusMsg" class="text-muted small mt-2"></div>
                <div id="panelError" class="text-danger small"></div>
                <h3 class="h6 mt-4">All panel members</h3>
                <div id="panelList" class="mt-2"></div>
              </div>

            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      // Track requisitions so search results can print a friendly requisition label.
      let requisitionById = new Map();
      function getReqLabel(reqId) {
        const id = String(reqId || '').trim();
        if (!id) return '';
        const r = requisitionById.get(id);
        if (!r) return id;
        return r.name ? `${r.reqId} — ${r.name}` : r.reqId;
      }

      function resetForm() {
        $('name').value = '';
        $('email').value = '';
        $('status').value = '';
        $('reqSelect').value = '';
        $('panelMemberSelect').value = '';
        $('comments').value = '';
        $('saveError').textContent = '';
      }

      async function save() {
        $('saveError').textContent = '';
        $('saveStatus').textContent = 'Saving...';

        const name = $('name').value;
        const email = $('email').value;
        const status = $('status').value || 'New';
        const requisitionId = $('reqSelect').value;
        const panelMemberId = $('panelMemberSelect').value;
        const comments = $('comments').value;

        let onNameConflict;

        // If email is empty, check for existing name and ask user what to do.
        if (!String(email || '').trim()) {
          const checkResp = await fetch(`/api/notes/name-exists?name=${encodeURIComponent(String(name || '').trim())}`);
          const check = await checkResp.json().catch(() => ({}));
          if (checkResp.ok && check.exists) {
            const suggested = check.suggestedName || `${String(name).trim()} - 2`;
            const choice = window.confirm(
              `A note with name "${String(name).trim()}" already exists (without email).\n\n` +
              `OK = Update existing\nCancel = Create new as "${suggested}"`
            );
            onNameConflict = choice ? 'update' : 'suffix';
          }
        }

        const payload = {
          name,
          email,
          status,
          requisitionId,
          panelMemberId,
          comments,
          ...(onNameConflict ? { onNameConflict } : {})
        };

        const resp = await fetch('/api/notes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          $('saveStatus').textContent = '';
          $('saveError').textContent = data?.details ? JSON.stringify(data.details) : (data?.error || 'Save failed');
          return;
        }

        $('saveStatus').textContent = `Saved. Updated at ${data.note.updated_at}`;
        resetForm();
        $('name').focus();
      }

      function renderResults(items) {
        const host = $('results');
        host.innerHTML = '';

        if (!items.length) {
          host.innerHTML = '<div class="text-muted small">No results</div>';
          return;
        }

        for (const r of items) {
          const div = document.createElement('div');
          div.className = 'card mb-2';
          div.innerHTML = `
            <div class="card-body py-2">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                  <div><strong>${escapeHtml(r.name)}</strong> <span class="text-muted">&lt;${escapeHtml(r.email || '')}&gt;</span></div>
                  <div class="text-muted small">Status: ${escapeHtml(r.status || 'New')}</div>
                  ${r.requisitionId ? `<div class="text-muted small">Req: ${escapeHtml(getReqLabel(r.requisitionId))}</div>` : ''}
                  ${r.panelMemberName ? `<div class="text-muted small">Panel: ${escapeHtml(r.panelMemberName)}</div>` : ''}
                  <div class="text-muted small">Created: ${r.created_at} | Updated: ${r.updated_at}</div>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-light btn-sm" type="button" data-action="edit">Edit</button>
                  <button class="btn btn-outline-danger btn-sm" type="button" data-action="delete">Delete</button>
                </div>
              </div>
              <pre class="mt-2 notes-collapsed">${escapeHtml(r.comments)}</pre>
              <button class="toggle-notes mt-1" type="button" style="display:none">Show more</button>
            </div>
          `;

          const pre = div.querySelector('pre');
          const toggle = div.querySelector('.toggle-notes');

          // Show toggle only if content actually overflows 4 lines
          requestAnimationFrame(() => {
            if (pre.scrollHeight > pre.clientHeight) {
              toggle.style.display = '';
            }
          });

          toggle.addEventListener('click', () => {
            const collapsed = pre.classList.contains('notes-collapsed');
            if (collapsed) {
              pre.classList.replace('notes-collapsed', 'notes-expanded');
              toggle.textContent = 'Show less';
            } else {
              pre.classList.replace('notes-expanded', 'notes-collapsed');
              toggle.textContent = 'Show more';
            }
          });

          div.querySelector('[data-action="edit"]').addEventListener('click', () => {
            $('name').value = r.name;
            $('email').value = r.email || '';
            $('status').value = r.status || '';
            if ($('reqSelect')) $('reqSelect').value = r.requisitionId || '';
            if ($('panelMemberSelect')) $('panelMemberSelect').value = r.panelMemberId || '';
            $('comments').value = r.comments;
            $('saveError').textContent = '';
            $('saveStatus').textContent = 'Editing loaded note. Click Save to update.';

            // Clear search UI and hide results after choosing an item to edit.
            $('search').value = '';
            $('searchStatus').value = '';
            $('results').innerHTML = '';

            window.scrollTo({ top: 0, behavior: 'smooth' });
            $('comments').focus();
          });

          div.querySelector('[data-action="delete"]').addEventListener('click', async () => {
            const url = r.email
              ? `/api/notes/${encodeURIComponent(r.email)}`
              : `/api/notes/id/${encodeURIComponent(r.id)}`;

            const resp = await fetch(url, { method: 'DELETE' });
            const data = await resp.json().catch(() => ({}));
            if (!resp.ok) {
              $('results').innerHTML = `<div class="text-danger small">${escapeHtml(data?.error || 'Delete failed')}</div>`;
              return;
            }

            div.remove();
          });

          host.appendChild(div);
        }
      }

      async function search() {
        const q = $('search').value.trim();
        const status = $('searchStatus').value.trim();
        const reqId = $('searchReqId').value.trim();
        const reqType = $('searchReqType').value.trim();
        if (!q && !status && !reqId && !reqType) return;

        const params = new URLSearchParams();
        if (q) params.set('q', q);
        if (status) params.set('status', status);
        if (reqId) params.set('requisitionId', reqId);
        if (reqType) params.set('reqType', reqType);

        const resp = await fetch(`/api/notes/search?${params.toString()}`);
        const data = await resp.json();
        if (!resp.ok) {
          $('results').innerHTML = `<div class="text-danger small">${escapeHtml(data?.error || 'Search failed')}</div>`;
          return;
        }
        renderResults(data.results);
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function debounce(fn, waitMs) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), waitMs);
        };
      }

      const searchDebounced = debounce(() => {
        const q = $('search').value.trim();
        const status = $('searchStatus').value.trim();
        const reqId = $('searchReqId').value.trim();
        const reqType = $('searchReqType').value.trim();
        if (!q && !status && !reqId && !reqType) {
          $('results').innerHTML = '';
          return;
        }
        search();
      }, 250);

      function clearSearch() {
        $('search').value = '';
        $('searchStatus').value = '';
        $('searchReqId').value = '';
        $('searchReqType').value = '';
        $('results').innerHTML = '';
        $('search').focus();
      }

      $('saveBtn').addEventListener('click', save);
      $('clearBtn').addEventListener('click', () => {
        resetForm();
        $('name').focus();
      });

      // Type-ahead search
      $('search').addEventListener('input', () => searchDebounced());
      $('searchStatus').addEventListener('change', () => searchDebounced());
      $('searchReqId').addEventListener('change', () => searchDebounced());
      $('searchReqType').addEventListener('change', () => searchDebounced());

      // Keep Enter-to-search behavior
      $('search').addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });

      $('comments').addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') save();
      });

      $('searchClearBtn').addEventListener('click', clearSearch);

      // Optional: Esc clears search
      $('search').addEventListener('keydown', (e) => {
        if (e.key === 'Escape') clearSearch();
      });

      function resetReqForm() {
        $('reqId').value = '';
        $('reqName').value = '';
        $('reqType').value = 'FTE';
        $('reqStatus').value = '';
        $('reqLink').value = '';
        $('reqError').textContent = '';
        $('reqStatusMsg').textContent = '';
      }

      async function loadRequisitions() {
        const resp = await fetch('/api/requisitions');
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          $('reqList').innerHTML = `<div class="text-danger small">${escapeHtml(data?.error || 'Failed to load requisitions')}</div>`;
          return;
        }

        const items = data.requisitions || [];
        requisitionById = new Map(items.map((r) => [r.reqId, r]));
        renderRequisitions(items);
      }

      function renderRequisitions(items) {
        const host = $('reqList');
        host.innerHTML = '';

        if (!items.length) {
          host.innerHTML = '<div class="text-muted small">No requisitions</div>';
          return;
        }

        for (const r of items) {
          const div = document.createElement('div');
          div.className = 'card mb-2';
          div.innerHTML = `
            <div class="card-body py-2">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                  <div><strong>${escapeHtml(r.reqId)}</strong> <span class="badge bg-secondary">${escapeHtml(r.type || '')}</span></div>
                  <div class="text-muted small">${escapeHtml(r.name || '')}</div>
                  <div class="text-muted small">Status: ${escapeHtml(r.status)}</div>
                  <div class="small"><a href="${escapeHtml(r.link)}" target="_blank" rel="noopener noreferrer">Open link</a></div>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-light btn-sm" type="button" data-action="edit">Edit</button>
                  <button class="btn btn-outline-danger btn-sm" type="button" data-action="delete">Delete</button>
                </div>
              </div>
            </div>
          `;

          div.querySelector('[data-action="edit"]').addEventListener('click', () => {
            $('reqId').value = r.reqId;
            $('reqName').value = r.name || '';
            $('reqType').value = r.type || 'FTE';
            $('reqStatus').value = r.status;
            $('reqLink').value = r.link;
            $('reqError').textContent = '';
            $('reqStatusMsg').textContent = 'Loaded requisition. Click Save to update.';
          });

          div.querySelector('[data-action="delete"]').addEventListener('click', async () => {
            const resp = await fetch(`/api/requisitions/${encodeURIComponent(r.reqId)}`, { method: 'DELETE' });
            const data = await resp.json().catch(() => ({}));
            if (!resp.ok) {
              $('reqError').textContent = data?.error || 'Delete failed';
              return;
            }

            div.remove();
          });

          host.appendChild(div);
        }
      }

      async function saveRequisition() {
        $('reqError').textContent = '';
        $('reqStatusMsg').textContent = 'Saving...';

        const payload = {
          reqId: $('reqId').value,
          name: $('reqName').value,
          type: $('reqType').value,
          status: $('reqStatus').value,
          link: $('reqLink').value
        };

        const resp = await fetch('/api/requisitions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          $('reqStatusMsg').textContent = '';
          $('reqError').textContent = data?.details ? JSON.stringify(data.details) : (data?.error || 'Save failed');
          return;
        }

        $('reqStatusMsg').textContent = `Saved. Updated at ${data.requisition.updated_at}`;
        resetReqForm();
        await loadRequisitions();
      }

      function populateRequisitionSelect(items) {
        const sel = $('reqSelect');
        const current = sel.value;
        sel.innerHTML = '<option value="" selected>Requisition</option>';

        for (const r of items) {
          const opt = document.createElement('option');
          opt.value = r.reqId;
          const label = r.name ? `${r.reqId} — ${r.name}` : r.reqId;
          opt.textContent = r.type ? `${label} [${r.type}]` : label;
          sel.appendChild(opt);
        }

        sel.value = current;

        const searchSel = $('searchReqId');
        const searchCurrent = searchSel.value;
        searchSel.innerHTML = '<option value="" selected>Any requisition</option>';

        for (const r of items) {
          const opt = document.createElement('option');
          opt.value = r.reqId;
          const label = r.name ? `${r.reqId} — ${r.name}` : r.reqId;
          opt.textContent = r.type ? `${label} [${r.type}]` : label;
          searchSel.appendChild(opt);
        }

        searchSel.value = searchCurrent;
      }

      async function loadRequisitionsForSelect() {
        const resp = await fetch('/api/requisitions');
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) return;
        populateRequisitionSelect(data.requisitions || []);
      }

      // When requisitions change (saved/deleted), reload selector too
      const _loadRequisitionsOriginal = loadRequisitions;
      loadRequisitions = async function () {
        await _loadRequisitionsOriginal();
        await loadRequisitionsForSelect();
      };

      // Initial load
      loadRequisitionsForSelect();

      // Hook up buttons
      $('reqSaveBtn').addEventListener('click', saveRequisition);
      $('reqClearBtn').addEventListener('click', resetReqForm);

      // Load requisitions at startup
      loadRequisitions();

      // ── Panel Members ──────────────────────────────────────────────────────

      function resetPanelForm() {
        $('panelName').value = '';
        $('panelEmail').value = '';
        $('panelDepartment').value = '';
        $('panelError').textContent = '';
        $('panelStatusMsg').textContent = '';
      }

      function renderPanelMembers(items) {
        const host = $('panelList');
        host.innerHTML = '';

        if (!items.length) {
          host.innerHTML = '<div class="text-muted small">No panel members</div>';
          return;
        }

        for (const m of items) {
          const div = document.createElement('div');
          div.className = 'card mb-2';
          div.innerHTML = `
            <div class="card-body py-2">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                  <div><strong>${escapeHtml(m.name)}</strong></div>
                  ${m.email ? `<div class="text-muted small">${escapeHtml(m.email)}</div>` : ''}
                  ${m.department ? `<div class="text-muted small">${escapeHtml(m.department)}</div>` : ''}
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-light btn-sm" type="button" data-action="edit">Edit</button>
                  <button class="btn btn-outline-danger btn-sm" type="button" data-action="delete">Delete</button>
                </div>
              </div>
            </div>
          `;

          div.querySelector('[data-action="edit"]').addEventListener('click', () => {
            $('panelName').value = m.name;
            $('panelEmail').value = m.email || '';
            $('panelDepartment').value = m.department || '';
            $('panelError').textContent = '';
            $('panelStatusMsg').textContent = 'Loaded. Click Save to update.';
          });

          div.querySelector('[data-action="delete"]').addEventListener('click', async () => {
            const resp = await fetch(`/api/panel-members/${encodeURIComponent(m.id)}`, { method: 'DELETE' });
            const data = await resp.json().catch(() => ({}));
            if (!resp.ok) {
              $('panelError').textContent = data?.error || 'Delete failed';
              return;
            }
            div.remove();
          });

          host.appendChild(div);
        }
      }

      async function loadPanelMembers() {
        const resp = await fetch('/api/panel-members');
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          $('panelList').innerHTML = `<div class="text-danger small">${escapeHtml(data?.error || 'Failed to load panel members')}</div>`;
          return;
        }
        renderPanelMembers(data.panelMembers || []);
      }

      async function savePanelMember() {
        $('panelError').textContent = '';
        $('panelStatusMsg').textContent = 'Saving...';

        const payload = {
          name: $('panelName').value,
          email: $('panelEmail').value,
          department: $('panelDepartment').value
        };

        const resp = await fetch('/api/panel-members', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          $('panelStatusMsg').textContent = '';
          $('panelError').textContent = data?.details ? JSON.stringify(data.details) : (data?.error || 'Save failed');
          return;
        }

        $('panelStatusMsg').textContent = `Saved.`;
        resetPanelForm();
        await loadPanelMembers();
      }

      function populatePanelMemberSelect(items) {
        const sel = $('panelMemberSelect');
        const current = sel.value;
        sel.innerHTML = '<option value="" selected>Panel member</option>';

        for (const m of items) {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          sel.appendChild(opt);
        }

        sel.value = current;
      }

      async function loadPanelMembersForSelect() {
        const resp = await fetch('/api/panel-members');
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) return;
        populatePanelMemberSelect(data.panelMembers || []);
      }

      // When panel members change (saved/deleted), reload selector too
      const _loadPanelMembersOriginal = loadPanelMembers;
      loadPanelMembers = async function () {
        await _loadPanelMembersOriginal();
        await loadPanelMembersForSelect();
      };

      // Initial load
      loadPanelMembersForSelect();

      $('panelSaveBtn').addEventListener('click', savePanelMember);
      $('panelClearBtn').addEventListener('click', resetPanelForm);

      loadPanelMembers();
    </script>

    <!-- Bootstrap JS (optional; used for some components) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
