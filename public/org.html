<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuity – Org Chart</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body { background: #fbfcfe; }

      .form-control, .form-select {
        border-radius: 0.75rem;
        border-color: #d0d7de;
        background: #ffffff;
      }
      .form-control:focus, .form-select:focus {
        border-color: #80b3ff;
        box-shadow: 0 0 0 .25rem rgba(128,179,255,.2);
      }
      .btn  { border-radius: 0.75rem; }
      .card { border-color: #e6e8eb; }

      /* ── Tree ── */
      #tree-root {
        overflow-x: auto;
        padding: 1rem;
      }

      .tree ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      /* top-level list */
      .tree > ul {
        padding-left: 0;
      }

      /* each child list is indented and connected with a vertical line */
      .tree li > ul {
        padding-left: 1.5rem;
        margin-left: 0.75rem;
        border-left: 2px solid #c8d0d8;
        margin-top: 0.35rem;
      }

      .tree li {
        display: flex;
        flex-direction: column;
        position: relative;
        padding-top: 0.35rem;
      }

      /* horizontal connector from the vertical rail to each node */
      .tree li > .node-row::before {
        content: '';
        position: absolute;
        left: -1.55rem;
        top: 1.1rem;
        width: 1rem;
        border-top: 2px solid #c8d0d8;
      }

      /* top-level nodes have no connector */
      .tree > ul > li > .node-row::before {
        display: none;
      }

      /* node card */
      .org-node {
        background: #fff;
        border: 1.5px solid #d0d7de;
        border-radius: 0.75rem;
        padding: 0.5rem 0.85rem;
        min-width: 160px;
        max-width: 260px;
        width: fit-content;
        cursor: pointer;
        transition: border-color .15s, box-shadow .15s;
        position: relative;
        z-index: 1;
      }
      .org-node:hover  { border-color: #80b3ff; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
      .org-node.selected { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.15); }

      .org-node .node-name  { font-weight: 600; font-size: .88rem; line-height: 1.2; word-break: break-word; }
      .org-node .node-title { font-size: .75rem; color: #6e7781; margin-top: .15rem; word-break: break-word; }
      .org-node .node-dept  { font-size: .7rem;  color: #9ba4ae;  margin-top: .1rem; word-break: break-word; }

      .org-node .node-actions {
        display: none;
        position: absolute;
        top: -0.6rem;
        right: -0.6rem;
        gap: 0.2rem;
      }
      .org-node:hover .node-actions,
      .org-node.selected .node-actions { display: flex; }

      .node-btn {
        width: 22px; height: 22px;
        border-radius: 50%;
        border: none;
        font-size: .65rem;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        line-height: 1;
      }
      .node-btn-edit   { background: #0d6efd; color: #fff; }
      .node-btn-delete { background: #dc3545; color: #fff; }
      .node-btn:hover  { opacity: .85; }

      /* collapse toggle */
      .collapse-btn {
        width: 18px; height: 18px;
        border-radius: 50%;
        border: 1.5px solid #c8d0d8;
        background: #fff;
        font-size: .65rem;
        line-height: 1;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        margin-top: 0.65rem;
        margin-left: 0.3rem;
        color: #6e7781;
        transition: background .15s;
      }
      .collapse-btn:hover { background: #f0f4f8; }

      .node-row {
        display: flex;
        align-items: flex-start;
        gap: 0.35rem;
      }

      /* empty state */
      #empty-state { color: #9ba4ae; text-align: center; padding: 3rem 1rem; }

      /* sidebar */
      #sidebar { min-width: 280px; }
    </style>
  </head>
  <body>
    <!-- Shared nav -->
    <nav class="navbar navbar-expand-sm navbar-light bg-white border-bottom mb-3 px-3">
      <span class="navbar-brand fw-semibold">Recuity</span>
      <div class="navbar-nav">
        <a class="nav-link" href="/index.html">Hiring</a>
        <a class="nav-link" href="/leave.html">Leave</a>
        <a class="nav-link" href="/todo.html">Todo</a>
        <a class="nav-link active fw-semibold" href="/org.html">Org</a>
      </div>
      <span id="appVersion" class="ms-auto text-muted" style="font-size:0.75rem"></span>
    </nav>

    <div class="container-fluid py-3 px-4">
      <div class="d-flex gap-4 align-items-start">

        <!-- ── Tree panel ── -->
        <div class="flex-grow-1 card shadow-sm">
          <div class="card-body p-2">
            <div id="tree-root">
              <div id="empty-state">No nodes yet. Add one using the form →</div>
              <div class="tree" id="tree-container" style="display:none"></div>
            </div>
          </div>
        </div>

        <!-- ── Sidebar form ── -->
        <div id="sidebar">
          <section class="card shadow-sm">
            <div class="card-body">
              <h2 class="h6 mb-3" id="form-title">Add node</h2>

              <input type="hidden" id="nodeId" />

              <div class="mb-2">
                <input id="nodeName" class="form-control form-control-sm" placeholder="Name *" />
              </div>
              <div class="mb-2">
                <input id="nodeTitle" class="form-control form-control-sm" placeholder="Job title" />
              </div>
              <div class="mb-2">
                <input id="nodeDept" class="form-control form-control-sm" placeholder="Department" />
              </div>
              <div class="mb-2">
                <input id="nodeEmail" class="form-control form-control-sm" type="email" placeholder="Email" />
              </div>
              <div class="mb-2">
                <select id="nodeParent" class="form-select form-select-sm">
                  <option value="">— No parent (root) —</option>
                </select>
              </div>
              <div class="mb-3">
                <input id="nodeSortOrder" class="form-control form-control-sm" type="number" placeholder="Sort order (0)" value="0" />
              </div>

              <div class="d-flex gap-2 align-items-center">
                <button id="saveBtn" class="btn btn-primary btn-sm">Save</button>
                <button id="clearBtn" type="button" class="btn btn-light btn-sm">Clear</button>
              </div>
              <div id="formStatus" class="text-muted small mt-2"></div>
              <div id="formError"  class="text-danger small mt-1"></div>
            </div>
          </section>
        </div>

      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmfXH6sRKBLm+8Z8TUjRXFGPOHP"
      crossorigin="anonymous"
    ></script>
    <script>
      const $ = (id) => document.getElementById(id);

      // ── State ─────────────────────────────────────────────────────────────────
      let allNodes = [];   // flat array from API
      let selectedId = null;

      function escapeHtml(s) {
        return String(s ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      // ── API ───────────────────────────────────────────────────────────────────
      async function fetchNodes() {
        const resp = await fetch('/api/org/nodes');
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) { showError(data?.error || 'Failed to load'); return; }
        allNodes = data.nodes || [];
        render();
      }

      async function saveNode() {
        $('formError').textContent  = '';
        $('formStatus').textContent = 'Saving…';

        const id         = $('nodeId').value ? Number($('nodeId').value) : null;
        const name       = $('nodeName').value.trim();
        const title      = $('nodeTitle').value.trim();
        const department = $('nodeDept').value.trim();
        const email      = $('nodeEmail').value.trim();
        const parent_id  = $('nodeParent').value ? Number($('nodeParent').value) : null;
        const sort_order = Number($('nodeSortOrder').value) || 0;

        if (!name) {
          $('formStatus').textContent = '';
          $('formError').textContent  = 'Name is required.';
          return;
        }

        const payload = { name, title, department, email, parent_id, sort_order };
        if (id) payload.id = id;

        const resp = await fetch('/api/org/nodes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json().catch(() => ({}));

        if (!resp.ok) {
          $('formStatus').textContent = '';
          $('formError').textContent  = data?.details
            ? JSON.stringify(data.details.fieldErrors)
            : (data?.error || 'Save failed');
          return;
        }

        $('formStatus').textContent = 'Saved.';
        clearForm();
        await fetchNodes();
      }

      async function deleteNode(id) {
        const resp = await fetch(`/api/org/nodes/${id}`, { method: 'DELETE' });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) { showError(data?.error || 'Delete failed'); return; }
        if (selectedId === id) { selectedId = null; clearForm(); }
        await fetchNodes();
      }

      // ── Form helpers ──────────────────────────────────────────────────────────
      function clearForm() {
        $('nodeId').value        = '';
        $('nodeName').value      = '';
        $('nodeTitle').value     = '';
        $('nodeDept').value      = '';
        $('nodeEmail').value     = '';
        $('nodeParent').value    = '';
        $('nodeSortOrder').value = '0';
        $('formError').textContent  = '';
        $('formStatus').textContent = '';
        $('form-title').textContent = 'Add node';
        selectedId = null;
        highlightSelected();
      }

      function loadFormFromNode(node) {
        $('nodeId').value        = node.id;
        $('nodeName').value      = node.name;
        $('nodeTitle').value     = node.title      || '';
        $('nodeDept').value      = node.department || '';
        $('nodeEmail').value     = node.email      || '';
        $('nodeParent').value    = node.parent_id  ?? '';
        $('nodeSortOrder').value = node.sort_order ?? 0;
        $('formError').textContent  = '';
        $('formStatus').textContent = 'Editing. Click Save to update.';
        $('form-title').textContent = 'Edit node';
        selectedId = node.id;
        highlightSelected();
        $('nodeName').focus();
      }

      function showError(msg) {
        $('formError').textContent = msg;
      }

      // ── Render ────────────────────────────────────────────────────────────────
      function populateParentSelect() {
        const sel     = $('nodeParent');
        const current = sel.value;
        const editId  = $('nodeId').value ? Number($('nodeId').value) : null;

        sel.innerHTML = '<option value="">— No parent (root) —</option>';
        for (const n of allNodes) {
          if (n.id === editId) continue;   // can't be own parent
          const opt = document.createElement('option');
          opt.value       = n.id;
          opt.textContent = n.name + (n.title ? ` (${n.title})` : '');
          sel.appendChild(opt);
        }
        sel.value = current;
      }

      function buildTree(nodes) {
        // id → children
        const childrenOf = new Map();
        const roots      = [];

        for (const n of nodes) {
          childrenOf.set(n.id, []);
        }
        for (const n of nodes) {
          if (n.parent_id && childrenOf.has(n.parent_id)) {
            childrenOf.get(n.parent_id).push(n);
          } else {
            roots.push(n);
          }
        }

        // Sort by sort_order then id
        const sortFn = (a, b) => a.sort_order - b.sort_order || a.id - b.id;
        roots.sort(sortFn);
        for (const arr of childrenOf.values()) arr.sort(sortFn);

        return { roots, childrenOf };
      }

      function renderNodeEl(node, childrenOf) {
        const li = document.createElement('li');

        const row = document.createElement('div');
        row.className = 'node-row';

        const card = document.createElement('div');
        card.className = 'org-node' + (node.id === selectedId ? ' selected' : '');
        card.dataset.id = node.id;
        card.innerHTML = `
          <div class="node-actions">
            <button class="node-btn node-btn-edit"   title="Edit"   data-action="edit">✎</button>
            <button class="node-btn node-btn-delete" title="Delete" data-action="delete">✕</button>
          </div>
          <div class="node-name">${escapeHtml(node.name)}</div>
          ${node.title      ? `<div class="node-title">${escapeHtml(node.title)}</div>`      : ''}
          ${node.department ? `<div class="node-dept">${escapeHtml(node.department)}</div>`  : ''}
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('[data-action]')) return;
          selectedId = node.id;
          highlightSelected();
        });

        card.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
          e.stopPropagation();
          loadFormFromNode(node);
          populateParentSelect();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        card.querySelector('[data-action="delete"]').addEventListener('click', async (e) => {
          e.stopPropagation();
          const children = childrenOf.get(node.id) || [];
          const warning  = children.length
            ? ` This node has ${children.length} direct child(ren) which will become root nodes.`
            : '';
          if (!confirm(`Delete "${node.name}"?${warning}`)) return;
          await deleteNode(node.id);
        });

        row.appendChild(card);

        const children = childrenOf.get(node.id) || [];
        if (children.length) {
          const toggleBtn = document.createElement('button');
          toggleBtn.className   = 'collapse-btn';
          toggleBtn.title       = 'Collapse';
          toggleBtn.textContent = '−';
          row.appendChild(toggleBtn);

          li.appendChild(row);

          const ul = document.createElement('ul');
          for (const child of children) {
            ul.appendChild(renderNodeEl(child, childrenOf));
          }
          li.appendChild(ul);

          toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const collapsed = ul.style.display === 'none';
            ul.style.display      = collapsed ? '' : 'none';
            toggleBtn.textContent = collapsed ? '−' : '+';
            toggleBtn.title       = collapsed ? 'Collapse' : 'Expand';
          });
        } else {
          li.appendChild(row);
        }

        return li;
      }

      function highlightSelected() {
        document.querySelectorAll('.org-node').forEach(el => {
          el.classList.toggle('selected', Number(el.dataset.id) === selectedId);
        });
      }

      function render() {
        const container = $('tree-container');
        const empty     = $('empty-state');
        container.innerHTML = '';

        populateParentSelect();

        if (!allNodes.length) {
          empty.style.display     = '';
          container.style.display = 'none';
          return;
        }

        empty.style.display     = 'none';
        container.style.display = '';

        const { roots, childrenOf } = buildTree(allNodes);
        const ul = document.createElement('ul');
        for (const root of roots) {
          ul.appendChild(renderNodeEl(root, childrenOf));
        }
        container.appendChild(ul);
        highlightSelected();
      }

      // ── Wire up ───────────────────────────────────────────────────────────────
      $('saveBtn').addEventListener('click', saveNode);
      $('clearBtn').addEventListener('click', () => {
        clearForm();
        populateParentSelect();
        $('nodeName').focus();
      });
      $('nodeName').addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveNode();
      });

      fetchNodes();

      async function fetchAppVersion() {
        const resp = await fetch('/api/version');
        const data = await resp.json().catch(() => ({}));
        if (resp.ok && data.version) {
          $('appVersion').textContent = `v${data.version}`;
        }
      }

      fetchAppVersion();
    </script>
  </body>
</html>
